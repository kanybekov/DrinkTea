<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DrinkTea v1.1</title>
    <base href="/" />

    <!-- Правильные ссылки на CDN (с префиксом cdn.) -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://jsdelivr.net">

    <!-- Базовый CSS -->
    <link rel="stylesheet" href="css/app.css" />

    <!-- Стили компонентов (ПРОВЕРЬ ИМЯ ПРОЕКТА ТУТ) -->
    <link href="DrinkTea.Frontend.styles.css" rel="stylesheet" />
</head>



<body class="bg-light">
    @* Добавили светло-серый фон для приятного контраста *@
    <div id="app">
        @* Заглушка загрузки *@
        <div class="d-flex justify-content-center align-items-center" style="height: 100vh;">
            <div class="text-center">
                <div class="spinner-border text-success" style="width: 3rem; height: 3rem;" role="status"></div>
                <div class="mt-3 fw-bold text-muted">Завариваем систему...</div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        Произошла ошибка.
        <a href="." class="reload">Обновить</a>
        <span class="dismiss">🗙</span>
    </div>

    @* Стандартный скрипт Blazor *@
    <script src="_framework/blazor.webassembly.js"></script>
    @* Bootstrap JS для модалок и выпадающих списков *@
    <script src="https://jsdelivr.net"></script>
</body>

</html>
