events { }
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        root /usr/share/nginx/html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Решаем проблему с хешами в именах
        location ~ ^/_framework/blazor\.webassembly\.js$ {
            root /usr/share/nginx/html;
            # Ищем любой файл, подходящий под маску (с хешем или без)
            rewrite ^/_framework/blazor\.webassembly\.js$ /_framework/blazor.webassembly.*.js break;
            # Если rewrite не сработал, пробуем отдать напрямую через маску в try_files
            try_files /_framework/blazor.webassembly.*.js =404;
        }

        location ~ ^/_framework/ {
            try_files $uri =404;
        }
    }
}
